<!DOCTYPE html>
<html lang="si">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Market Billing Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/exceljs@4.3.0/dist/exceljs.min.js"></script>

<style>
    :root {
        --primary: #6366f1;
        --primary-hover: #4f46e5;
        --secondary: #ec4899;
        --success: #10b981;
        --excel: #059669;
        --danger: #f43f5e;
        --warning: #f59e0b;
        --bg: #f8fafc;
        --card: #ffffff;
        --text-main: #1e293b;
        --text-sub: #64748b;
        --glass: rgba(255, 255, 255, 0.95);
    }

    * { box-sizing: border-box; font-family: 'Poppins', sans-serif; }
    
    body { 
        margin: 0; 
        padding: 20px; 
        background: radial-gradient(circle at top left, #e0e7ff 0%, #f8fafc 40%);
        color: var(--text-main);
        min-height: 100vh;
    }

    .container { 
        max-width: 1400px; 
        margin: auto; 
        background: var(--glass); 
        padding: 30px; 
        border-radius: 24px; 
        box-shadow: 0 20px 50px rgba(0,0,0,0.05);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255,255,255,0.7);
    }

    header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 30px;
        border-bottom: 2px solid #f1f5f9;
        padding-bottom: 20px;
    }

    .title-area h2 { 
        margin: 0; 
        background: linear-gradient(to right, #4f46e5, #ec4899);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        font-size: 28px;
        font-weight: 700;
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .top-grid {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 20px;
        margin-bottom: 20px;
    }

    .search-box {
        position: relative;
        flex-grow: 1;
    }

    .search-box i {
        position: absolute;
        left: 15px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-sub);
    }

    .search-box input {
        width: 100%;
        padding: 14px 14px 14px 45px;
        border-radius: 15px;
        border: 1.5px solid #e2e8f0;
        background: #fdfdfd;
        font-size: 15px;
        transition: 0.3s;
    }

    .search-box input:focus {
        border-color: var(--primary);
        outline: none;
        box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
    }

    .button-group { display: flex; gap: 10px; flex-wrap: wrap; }

    button { 
        padding: 12px 20px; 
        border-radius: 14px; 
        border: none; 
        cursor: pointer; 
        font-weight: 600; 
        display: flex; 
        align-items: center; 
        gap: 8px;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        color: white;
        font-size: 14px;
    }

    button:hover { transform: translateY(-3px); box-shadow: 0 8px 15px rgba(0,0,0,0.1); }
    button:active { transform: translateY(0); }

    .btn-upload { background: linear-gradient(135deg, #8b5cf6, #6366f1); }
    .btn-process { background: linear-gradient(135deg, #3b82f6, #2563eb); }
    .btn-copy { background: linear-gradient(135deg, #10b981, #059669); }
    .btn-export { background: linear-gradient(135deg, #059669, #064e3b); }
    .btn-clear { background: linear-gradient(135deg, #f43f5e, #e11d48); }

    textarea { 
        width: 100%; 
        height: 160px; 
        padding: 20px; 
        border-radius: 20px; 
        border: 1.5px solid #e2e8f0; 
        background: #f8fafc;
        resize: vertical; 
        font-family: 'Consolas', monospace; 
        margin-bottom: 25px;
        font-size: 14px;
        transition: 0.3s;
    }

    textarea:focus { border-color: var(--primary); outline: none; background: #fff; }

    .stats-container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 20px;
        margin-bottom: 30px;
    }

    .stat-card {
        background: white;
        padding: 20px;
        border-radius: 20px;
        border-left: 6px solid var(--primary);
        box-shadow: 0 10px 20px rgba(0,0,0,0.02);
        display: flex;
        align-items: center;
        gap: 15px;
    }

    .stat-icon {
        width: 50px;
        height: 50px;
        border-radius: 12px;
        background: #eef2ff;
        color: var(--primary);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
    }

    .stat-info h3 { margin: 0; font-size: 13px; color: var(--text-sub); text-transform: uppercase; letter-spacing: 1px; }
    .stat-info p { margin: 5px 0 0; font-size: 28px; font-weight: 700; color: var(--text-main); }

    .table-wrap { 
        margin-top: 20px; 
        overflow: auto; 
        border-radius: 20px; 
        border: 1px solid #e2e8f0; 
        display: none; 
        max-height: 600px; 
        box-shadow: 0 10px 30px rgba(0,0,0,0.03);
    }

    table { width: 100%; border-collapse: collapse; font-size: 13.5px; min-width: 1300px; }

    th { 
        background: #f1f5f9; 
        color: var(--text-main); 
        position: sticky; 
        top: 0; 
        z-index: 10; 
        font-weight: 600; 
        padding: 18px 15px;
        text-align: left;
        border-bottom: 2px solid #e2e8f0;
    }

    td { padding: 14px 15px; border-bottom: 1px solid #f1f5f9; color: var(--text-main); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f8fafc; cursor: default; }

    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

    @media (max-width: 768px) {
        .top-grid { grid-template-columns: 1fr; }
        .button-group { justify-content: center; }
    }
</style>
</head>
<body>

<div class="container">
    <header>
        <div class="title-area">
            <h2><i class="fa-solid fa-file-invoice-dollar"></i> Pro Market Billing Tool</h2>
        </div>
        <div class="button-group">
            <button class="btn-clear" id="clearBtn"><i class="fa-solid fa-trash-can"></i> Clear All</button>
        </div>
    </header>

    <div class="top-grid">
        <div class="search-box">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="search" placeholder="Search filtered results...">
        </div>
        <div class="button-group">
            <input type="file" id="fileUpload" accept=".xlsx, .xls, .csv" style="display:none;">
            <button class="btn-upload" id="uploadBtn"><i class="fa-solid fa-cloud-arrow-up"></i> Upload Excel</button>
            <button class="btn-process" id="processBtn"><i class="fa-solid fa-gears"></i> Process Data</button>
            <button class="btn-copy" id="copyBtn"><i class="fa-solid fa-copy"></i> Copy Output</button>
            <button class="btn-export" id="exportBtn"><i class="fa-solid fa-file-excel"></i> Export (.xlsx)</button>
        </div>
    </div>

    <textarea id="rawData" placeholder="Insert Market Order data here, or use the 'Upload Excel' button above to import a file."></textarea>

    <div class="stats-container">
        <div class="stat-card">
            <div class="stat-icon"><i class="fa-solid fa-shop"></i></div>
            <div class="stat-info">
                <h3>Unique Outlets Count</h3>
                <p id="rowsCount">0</p>
            </div>
        </div>
        <div class="stat-card" style="border-left-color: var(--success);">
            <div class="stat-icon" style="background: #f0fdf4; color: var(--success);"><i class="fa-solid fa-sack-dollar"></i></div>
            <div class="stat-info">
                <h3>Total Order Value</h3>
                <p id="totalValue" style="font-size: 20px;">0.00</p>
            </div>
        </div>
        <div class="stat-card" style="border-left-color: var(--secondary);">
            <div class="stat-icon" style="background: #fdf2f8; color: var(--secondary);"><i class="fa-solid fa-calendar-check"></i></div>
            <div class="stat-info">
                <h3>Status</h3>
                <p id="statusMsg" style="font-size: 18px; color: var(--text-sub);">Waiting for data...</p>
            </div>
        </div>
    </div>

    <div id="searchCount" style="font-size: 13px; color: var(--text-sub); margin: 8px 4px; display:none;"></div>

    <div class="table-wrap" id="tableWrap">
        <table id="billingTable">
            <thead id="tableHead"></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    let clipboardOutput = "", exportHTMLTableContent = "", rowCounter = 0;

    // Search functionality
    document.getElementById('search').addEventListener('keyup', function() {
        const value = this.value.toLowerCase();
        const rows = document.querySelectorAll('#tableBody tr');
        let visible = 0;
        rows.forEach(row => {
            const match = row.innerText.toLowerCase().includes(value);
            row.style.display = match ? '' : 'none';
            if (match) visible++;
        });
        const countEl = document.getElementById('searchCount');
        if (value.trim()) {
            countEl.style.display = 'block';
            countEl.textContent = `Showing ${visible} of ${rows.length} results`;
        } else {
            countEl.style.display = 'none';
        }
    });

    document.getElementById('uploadBtn').addEventListener('click', () => document.getElementById('fileUpload').click());

    document.getElementById('fileUpload').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        document.getElementById('statusMsg').innerText = "Reading file...";
        
        const reader = new FileReader();
        reader.onload = function(evt) {
            const workbook = XLSX.read(evt.target.result, { type: 'binary' });
            const worksheet = workbook.Sheets[workbook.SheetNames[0]];
            const jsonRows = XLSX.utils.sheet_to_json(worksheet, { header: 1, defval: "" });
            processDataArray(jsonRows);
        };
        reader.readAsBinaryString(file);
        e.target.value = ''; 
    });

    document.getElementById('processBtn').addEventListener('click', function() {
        const text = document.getElementById('rawData').value;
        if (!text.trim()) { alert("කරුණාකර දත්ත ඇතුළත් කරන්න!"); return; }
        const rows = text.split(/\r?\n/).map(row => row.split('\t'));
        processDataArray(rows);
    });

    function processDataArray(rows) {
        rowCounter = 0;
        let totalOrderValue = 0;
        if (rows.length === 0) return;
        
        let headers = ["Order Type", "Order Date", "Party HUL Code", "Party Name", "Beat Name", "Salesperson Name", "Total Order Value", "Bill Age", "Approval Days", "Exceed days"];
        let headHtml = "<tr>" + headers.map(h => `<th>${h}</th>`).join("") + "</tr>";
        let bodyHtml = "", textOutput = headers.join("\t") + "\n";
        const seenHulCodes = new Set();

        for (let i = 1; i < rows.length; i++) {
            if (rows[i].length === 0 || (rows[i].length === 1 && rows[i][0] === "")) continue;
            
            let hulCode = rows[i][2] ? String(rows[i][2]).trim() : '';
            if (hulCode && !seenHulCodes.has(hulCode)) {
                seenHulCodes.add(hulCode); 
                rowCounter++;

                let orderVal = parseFloat(String(rows[i][19] || '0').replace(/,/g, '')) || 0;
                totalOrderValue += orderVal;
                
                let rowData = [
                    rows[i][0] || '', rows[i][1] || '', hulCode, 
                    rows[i][5] || '', rows[i][6] || '', rows[i][7] || '', 
                    rows[i][19] || '', '', '', ''
                ];
                bodyHtml += "<tr>" + rowData.map(d => `<td>${escapeHtml(String(d))}</td>`).join("") + "</tr>";
                textOutput += rowData.join("\t") + "\n";
            }
        }
        
        document.getElementById("rowsCount").innerText = rowCounter;
        document.getElementById("totalValue").innerText = totalOrderValue.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        document.getElementById("statusMsg").innerText = "Data Processed!";
        document.getElementById("statusMsg").style.color = "var(--success)";
        document.getElementById("tableHead").innerHTML = headHtml;
        document.getElementById("tableBody").innerHTML = bodyHtml;
        document.getElementById("tableWrap").style.display = "block";
        document.getElementById("searchCount").style.display = "none";
        document.getElementById("search").value = "";
        clipboardOutput = textOutput; 
        exportHTMLTableContent = "<thead>" + headHtml + "</thead><tbody>" + bodyHtml + "</tbody>";
    }
    
    document.getElementById('copyBtn').addEventListener('click', function() {
        if(!clipboardOutput) return;
        navigator.clipboard.writeText(clipboardOutput);
        this.innerHTML = '<i class="fa-solid fa-check"></i> Copied!';
        setTimeout(() => this.innerHTML = '<i class="fa-solid fa-copy"></i> Copy Output', 2000);
    });

    document.getElementById('exportBtn').addEventListener('click', async function() {
        if (!exportHTMLTableContent) return;

        const btn = this;
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Exporting...';
        btn.disabled = true;

        try {
            const wb = new ExcelJS.Workbook();
            wb.creator = 'Market Billing Tool';
            const ws = wb.addWorksheet('Market Billing', {
                views: [{ state: 'frozen', ySplit: 1 }]
            });

            // Column widths
            ws.columns = [
                { key: 'a', width: 14 }, { key: 'b', width: 14 },
                { key: 'c', width: 18 }, { key: 'd', width: 34 },
                { key: 'e', width: 22 }, { key: 'f', width: 26 },
                { key: 'g', width: 20 }, { key: 'h', width: 12 },
                { key: 'i', width: 16 }, { key: 'j', width: 14 },
            ];

            const C_HEADER_BG = 'FF4F46E5';  // Indigo
            const C_HEADER_BD = 'FF3730A3';  // Indigo dark (border)
            const C_WHITE     = 'FFFFFFFF';
            const C_ALT       = 'FFEEF2FF';  // Light indigo
            const C_TOTAL_BG  = 'FFE0E7FF';
            const C_BORDER    = 'FFE2E8F0';  // Slate-200

            const border = (c) => ({ style: 'thin', color: { argb: c } });
            const allBorders = (c) => ({ top: border(c), bottom: border(c), left: border(c), right: border(c) });

            // ── Header row ──
            const headers = ["Order Type", "Order Date", "Party HUL Code", "Party Name",
                             "Beat Name", "Salesperson Name", "Total Order Value",
                             "Bill Age", "Approval Days", "Exceed days"];
            const hRow = ws.addRow(headers);
            hRow.height = 32;
            hRow.eachCell(cell => {
                cell.fill      = { type: 'pattern', pattern: 'solid', fgColor: { argb: C_HEADER_BG } };
                cell.font      = { bold: true, color: { argb: C_WHITE }, size: 11, name: 'Poppins' };
                cell.alignment = { vertical: 'middle', horizontal: 'center', wrapText: true };
                cell.border    = allBorders(C_HEADER_BD);
            });

            // Auto-filter on header
            ws.autoFilter = { from: 'A1', to: 'J1' };

            // ── Data rows ──
            const tableRows = document.querySelectorAll('#tableBody tr');
            tableRows.forEach((tr, idx) => {
                const cells  = tr.querySelectorAll('td');
                const values = Array.from(cells).map(td => td.innerText.trim());

                // Parse Total Order Value as real number
                const num = parseFloat(values[6].replace(/,/g, ''));
                if (!isNaN(num)) values[6] = num;

                const dRow  = ws.addRow(values);
                dRow.height = 22;
                const bg    = idx % 2 === 0 ? C_WHITE : C_ALT;

                dRow.eachCell({ includeEmpty: true }, (cell, col) => {
                    cell.fill      = { type: 'pattern', pattern: 'solid', fgColor: { argb: bg } };
                    cell.font      = { size: 10 };
                    cell.border    = allBorders(C_BORDER);
                    cell.alignment = { vertical: 'middle' };

                    if (col === 7) {   // Total Order Value
                        cell.numFmt    = '#,##0.00';
                        cell.alignment = { vertical: 'middle', horizontal: 'right' };
                    }
                });
            });

            // ── Total row ──
            const lastDataRow = tableRows.length + 1;
            const totalRow = ws.addRow([
                '', '', '', '', '', 'TOTAL',
                { formula: `SUM(G2:G${lastDataRow})` },
                '', '', ''
            ]);
            totalRow.height = 26;
            totalRow.eachCell({ includeEmpty: true }, (cell, col) => {
                cell.fill   = { type: 'pattern', pattern: 'solid', fgColor: { argb: C_TOTAL_BG } };
                cell.font   = { bold: true, size: 11 };
                cell.border = allBorders(C_HEADER_BG);
                cell.alignment = { vertical: 'middle' };
                if (col === 6) cell.alignment = { vertical: 'middle', horizontal: 'right' };
                if (col === 7) {
                    cell.numFmt    = '#,##0.00';
                    cell.alignment = { vertical: 'middle', horizontal: 'right' };
                }
            });

            // ── Download ──
            const buffer = await wb.xlsx.writeBuffer();
            const blob   = new Blob([buffer], {
                type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'
            });
            const link   = document.createElement('a');
            link.href    = URL.createObjectURL(blob);
            link.download = 'market_billing_report.xlsx';
            link.click();
            URL.revokeObjectURL(link.href);

        } catch (err) {
            alert('Export error: ' + err.message);
            console.error(err);
        }

        btn.innerHTML = '<i class="fa-solid fa-file-excel"></i> Export (.xlsx)';
        btn.disabled  = false;
    });

    document.getElementById('clearBtn').addEventListener('click', () => {
        document.getElementById("rawData").value = "";
        document.getElementById("tableBody").innerHTML = "";
        document.getElementById("tableWrap").style.display = "none";
        document.getElementById("rowsCount").innerText = "0";
        document.getElementById("totalValue").innerText = "0.00";
        document.getElementById("statusMsg").innerText = "Cleared!";
        document.getElementById("statusMsg").style.color = "var(--text-sub)";
        document.getElementById("searchCount").style.display = "none";
        document.getElementById("search").value = "";
        clipboardOutput = "";
        exportHTMLTableContent = "";
        rowCounter = 0;
    });

    function escapeHtml(text){
        if (!text) return '';
        const div = document.createElement("div");
        div.innerText = text;
        return div.innerHTML;
    }
</script>
</body>
</html>
