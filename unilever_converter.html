<!DOCTYPE html>
<html lang="si">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unilever Claim Converter</title>
<style>
    :root{ --primary:#2563eb; --success:#10b981; --excel:#16a34a; --danger:#ef4444; --bg:#f1f5f9; --card:#ffffff; --text:#0f172a; }
    body{ margin:0; padding:20px; background:var(--bg); font-family:Segoe UI,sans-serif; color:var(--text); }
    .container{ max-width:100%; margin:auto; background:var(--card); padding:25px; border-radius:20px; box-shadow:0 10px 30px rgba(0,0,0,.08); }
    h2 { margin-top:0; color:#1e3a8a; border-bottom: 2px solid #2563eb; padding-bottom: 10px; }
    .top{ display:flex; gap:10px; flex-wrap:wrap; margin-bottom:15px; }
    input, button { padding:12px; border-radius:12px; border:1px solid #cbd5e1; font-size:14px; }
    button{ border:none; cursor:pointer; font-weight:600; transition: all 0.2s ease; margin-right: 5px; }
    button:hover { transform: translateY(-1px); opacity: 0.9; }
    .primary{ background:var(--primary); color:white; }
    .success{ background:var(--success); color:white; }
    .excel{ background:var(--excel); color:white; }
    .danger{ background:var(--danger); color:white; }
    textarea{ width:100%; height:150px; padding:15px; border-radius:16px; border:2px solid #dbeafe; resize:vertical; box-sizing:border-box; font-family:Consolas,monospace; margin-bottom: 15px; }
    .stats{ display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:10px; margin-top:20px; margin-bottom: 20px;}
    .card{ background:#eff6ff; padding:15px; border-radius:14px; }
    .card h3{ margin:0; font-size:14px; color:#475569; }
    .card p{ margin:8px 0 0; font-size:22px; font-weight:700; }
    .card.money { background: #ecfdf5; }
    .card.money p { color: #065f46; }
    .table-wrap{ margin-top:20px; overflow:auto; border-radius:16px; border:2px solid #bdc3c7; display:none; max-height:500px; }
    table{ width:100%; border-collapse:collapse; font-size: 13px; min-width: 1200px; text-align: left; }
    th,td{ padding:12px 10px; border:1px solid #bdc3c7; white-space:nowrap; }
    th{ background:#2c3e50; color: white; position:sticky; top:0; z-index: 10; font-weight: 600; }
    tr:nth-child(even){ background:#f9f9f9; }
    tr:hover td { background-color: #f1f1f1; }
    .total-row { background-color: #f1f5f9 !important; font-weight: bold; border-top: 2px solid #cbd5e1; }
</style>
</head>
<body>
<div class="container">
    <h2>🔄 Unilever Claim Converter</h2>
    <div class="top">
        <input type="text" id="search" placeholder="Search data here...">
        <button class="primary" id="processBtn">Process Data</button>
        <button class="success" id="copyBtn">Copy Output</button>
        <button class="excel" id="exportBtn">Export Excel (.xls)</button>
        <button class="danger" id="clearBtn">Clear All</button>
    </div>
    <textarea id="rawData" placeholder="Unilever Claim දත්ත මෙතනට Paste කරන්න..."></textarea>
    <div class="stats">
        <div class="card"><h3>Total Rows</h3><p id="rowsCount">0</p></div>
        <div class="card money"><h3>Total Value / Amount</h3><p id="totalAmountText">Rs. 0.00</p></div>
    </div>
    <div class="table-wrap" id="tableWrap">
        <table><thead id="tableHead"></thead><tbody id="tableBody"></tbody></table>
    </div>
</div>
<script>
    let clipboardOutput = "", exportHTMLTableContent = "", rowCounter = 0;
    document.getElementById('processBtn').addEventListener('click', function() {
        const text = document.getElementById('rawData').value;
        if (!text || !text.trim()) { alert("කරුණාකර ප්‍රථමයෙන් දත්ත Paste කරන්න!"); return; }
        const rows = text.split(/\r?\n/).map(row => row.split('\t'));
        rowCounter = 0; exportHTMLTableContent = "";
        let headers = ["OPSO No", "Promotion Name", "Scheme", "Promotion Start Date", "Promotion End Date", "Qty for promotion", "Actual Value for promotion", "18% VAT", "Value to be credited", "Value Credited", "Balance", "Memo No.", "Memo Date", "Remarks"];
        let headHtml = "<tr>" + headers.map(h => `<th>${escapeHtml(h)}</th>`).join("") + "</tr>";
        let bodyHtml = "", textOutput = headers.join("\t") + "\n";
        let grandActual = 0, grandVat = 0, grandTotal = 0, grandCredited = 0, grandBalance = 0;
        let startRow = (rows[0][0] && (rows[0][0].toLowerCase().includes("claim") || rows[0][1].toLowerCase().includes("invoice"))) ? 1 : 0;

        for (let i = startRow; i < rows.length; i++) {
            let r = rows[i]; if (r.length < 5 || (r.length === 1 && r[0].trim() === "")) continue;
            rowCounter++;
            let claimDesc = r[5] ? r[5].trim() : "", opsoNo = "", promoName = claimDesc;
            if (claimDesc.includes("-") && claimDesc.includes(":")) {
                let parts = claimDesc.split(":"); promoName = parts[1] ? parts[1].trim() : claimDesc;
                let firstPart = parts[0].split("-")[0]; if (!isNaN(firstPart.trim()) && firstPart.trim().length >= 5) opsoNo = firstPart.trim();
            } else if (claimDesc.includes("-")) {
                let parts = claimDesc.split("-"); if(!isNaN(parts[0].trim())) { opsoNo = parts[0].trim(); promoName = claimDesc.substring(claimDesc.indexOf("-") + 1).trim(); }
            }
            let scheme = (promoName.toLowerCase().includes("free") || claimDesc.toLowerCase().includes("buy")) ? "Free Product" : "Disc. Percentage";
            let qty = "0", qtyMatch = promoName.match(/\d+/); if (qtyMatch && scheme === "Free Product") qty = qtyMatch[0];
            let actualVal = parseFloat((r[6]||"0").replace(/[^0-9.-]+/g,"")) || 0;
            let vatVal = parseFloat((r[7]||"0").replace(/[^0-9.-]+/g,"")) || 0;
            let totalVal = parseFloat((r[8]||"0").replace(/[^0-9.-]+/g,"")) || 0;
            let balVal = parseFloat((r[11]||"0").replace(/[^0-9.-]+/g,"")) || 0;
            let valueCredited = (r[9]||"").toLowerCase().includes("approv") || r[10] ? totalVal : 0;
            grandActual += actualVal; grandVat += vatVal; grandTotal += totalVal; grandCredited += valueCredited; grandBalance += balVal;

            let outRow = [opsoNo, promoName, scheme, formatExcelDate(r[2]||""), formatExcelDate(r[2]||""), qty, actualVal.toFixed(2), vatVal.toFixed(2), totalVal.toFixed(2), valueCredited.toFixed(2), balVal.toFixed(2), r[1]?r[1].trim():"", formatExcelDate(r[10]||r[2]||""), r[9]?r[9].trim():"Pending"];
            bodyHtml += "<tr>" + outRow.map(d => `<td x:str style="mso-number-format:'\\@'; white-space:nowrap;">${escapeHtml(String(d))}</td>`).join("") + "</tr>";
            textOutput += outRow.join("\t") + "\n";
        }
        bodyHtml += `<tr class="total-row"><td colspan="5" style="text-align:right;">GRAND TOTAL:</td><td></td><td>${grandActual.toFixed(2)}</td><td>${grandVat.toFixed(2)}</td><td>${grandTotal.toFixed(2)}</td><td>${grandCredited.toFixed(2)}</td><td>${grandBalance.toFixed(2)}</td><td colspan="3"></td></tr>`;
        document.getElementById("totalAmountText").innerText = "Rs. " + grandTotal.toLocaleString('en-US', {minimumFractionDigits: 2});
        document.getElementById("rowsCount").innerText = rowCounter;
        document.getElementById("tableHead").innerHTML = headHtml;
        document.getElementById("tableBody").innerHTML = bodyHtml;
        document.getElementById("tableWrap").style.display = "block";
        clipboardOutput = textOutput; exportHTMLTableContent = "<thead>" + headHtml + "</thead><tbody>" + bodyHtml + "</tbody>";
    });
    document.getElementById('copyBtn').addEventListener('click', function() { if(!clipboardOutput){ alert("ප්‍රථමයෙන් දත්ත Process කර ගන්න!"); return; } navigator.clipboard.writeText(clipboardOutput); alert("දත්ත Copy කරගන්නා ලදී!"); });
    document.getElementById('exportBtn').addEventListener('click', function() { if(!exportHTMLTableContent){ alert("ප්‍රථමයෙන් දත්ත Process කර ගන්න!"); return; } const excelFile = `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40"><head><style>table { border-collapse: collapse; } th { background-color: #2c3e50; color: white; border: 1px solid #34495e; font-weight: bold; padding: 10px; } td { border: 1px solid #bdc3c7; mso-number-format:"\\@"; padding: 10px; }</style></head><body><table>${exportHTMLTableContent}</table></body></html>`; const blob = new Blob([excelFile], { type: "application/vnd.ms-excel;charset=utf-8" }); const link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.download = "unilever_claim_report.xls"; link.click(); });
    document.getElementById('clearBtn').addEventListener('click', function() { document.getElementById("rawData").value = ""; document.getElementById("tableHead").innerHTML = ""; document.getElementById("tableBody").innerHTML = ""; document.getElementById("tableWrap").style.display = "none"; document.getElementById("rowsCount").innerText = "0"; document.getElementById("totalAmountText").innerText = "Rs. 0.00"; clipboardOutput = ""; exportHTMLTableContent = ""; });
    function formatExcelDate(serial){ if(!serial) return ""; if(isNaN(serial) || serial.includes("/") || serial.includes("-")) return serial; let date_info = new Date(Math.floor(parseFloat(serial) - 25569) * 86400 * 1000); return `${date_info.getFullYear()}-${("0" + (date_info.getMonth()+1)).slice(-2)}-${("0" + date_info.getDate()).slice(-2)}`; }
    function escapeHtml(text){ if (!text) return ''; const div = document.createElement("div"); div.innerText = text; return div.innerHTML; }
    document.getElementById("search").addEventListener("keyup", function(){ const value = this.value.toLowerCase(); document.querySelectorAll("#tableBody tr").forEach(tr=>{ if(!tr.classList.contains('total-row')) tr.style.display = tr.innerText.toLowerCase().includes(value) ? "" : "none"; }); });
</script>
</body>
</html>
